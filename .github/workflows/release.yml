# Tag release: build the React app, bundle static files into wheel/sdist, publish to
# PyPI, then build and push the production Docker image (installs matyan-ui from PyPI).
#
# Uses OIDC Trusted Publisher — no API token secret required for PyPI.
# One-time setup on PyPI:
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. Add a new pending publisher:
#      - PyPI project name : matyan-ui
#      - Owner             : <your-github-org-or-username>
#      - Repository        : matyan-ui   (the repo that holds this file)
#      - Workflow name     : release.yml
#      - Environment name  : pypi
#
# The "pypi" GitHub environment can optionally have branch/tag
# protection rules to restrict which refs are allowed to publish.
#
# Docker Hub (for the docker job):
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

name: Release (PyPI + Docker)

on:
  push:
    tags:
      - '**'

env:
  IMAGE_NAME: matyan-ui

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # setuptools-scm derives the version from git tags; full history is required
          fetch-depth: 0

      - name: Set version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Set package.json version from tag
        working-directory: web
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Install web dependencies
        working-directory: web
        run: npm ci --legacy-peer-deps

      - name: Build web UI
        working-directory: web
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          GENERATE_SOURCEMAP: 'false'
        run: npm run build

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build wheel and sdist
        run: uv build

      - name: Upload distributions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Required for OIDC Trusted Publisher authentication
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  docker-build-and-push:
    name: Docker build and push
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI index propagation
        run: sleep 60

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          build-args: |
            IMAGE_VERSION=${{ steps.version.outputs.version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
